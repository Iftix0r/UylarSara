{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container animate-fade-in" style="padding-top: 48px; max-width: 420px;">
    <div style="background: var(--bg-card); padding: 40px 32px; border-radius: 24px; border: 1px solid var(--border-light); box-shadow: var(--shadow-lg); text-align: center;">

        <!-- Logo -->
        <img src="{% static 'img/logo.png' %}" alt="SaraUylar" style="width:72px;height:72px;border-radius:18px;object-fit:contain;margin:0 auto 16px;display:block">
        <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:6px;color:var(--text)">SaraUylar</h1>
        <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:32px">Kirish uchun Telegram dan foydalaning</p>

        <!-- Telegram Login Widget -->
        <div style="display:flex;justify-content:center;margin-bottom:24px">
            <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="SaraUylarbot"
                data-size="large"
                data-auth-url="https://sarauylar.uz/telegram-auth/"
                data-request-access="write">
            </script>
        </div>

        <p style="color:var(--text-muted);font-size:.78rem">
            Telegram akkauntingiz orqali xavfsiz kirish
        </p>

        <!-- Admin uchun yashirin forma -->
        <details style="margin-top:24px;text-align:left">
            <summary style="color:var(--text-muted);font-size:.75rem;cursor:pointer;text-align:center">Admin kirish</summary>
            <form method="POST" style="margin-top:16px">
                {% csrf_token %}
                {% if form.non_field_errors %}
                <div style="background:rgba(239,68,68,.1);color:#ef4444;padding:10px;border-radius:10px;margin-bottom:12px;font-size:.82rem">
                    {{ form.non_field_errors }}
                </div>
                {% endif %}
                <input type="text" name="username" class="form-input" placeholder="Login" required style="margin-bottom:10px">
                <input type="password" name="password" class="form-input" placeholder="Parol" required style="margin-bottom:12px">
                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px">Kirish</button>
            </form>
        </details>
    </div>
</div>

<script>
const tgLogin = window.Telegram?.WebApp;
if (tgLogin && tgLogin.initData) {
    tgLogin.BackButton.show();
    tgLogin.BackButton.onClick(() => { window.location.href = "/"; });
}
</script>
{% endblock %}
